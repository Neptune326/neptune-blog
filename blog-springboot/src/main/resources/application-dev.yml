# ===================================================
# 开发环境配置（dev）
# ===================================================
server:
  port: 8080
  # 静态资源映射（上传文件可通过 /uploads/** 访问）
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 文件上传存储路径（开发环境）
blog:
  upload:
    path: ./uploads/
    url-prefix: http://localhost:8080/uploads/

# 日志：开发环境输出 debug 级别，方便排查问题
logging:
  level:
    com.blog: debug
    org.springframework.web: debug
